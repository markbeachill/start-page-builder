<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Family &amp; Home Start Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
/* Skin: Classic Responsive */
:root{--columns:3;--c-blue:#4d90fe;--c-green:#35aa47;--c-orange:#d84a38;--c-purple:#852b99;--c-red:#bd121d;}
body{margin:0;padding:0;font-family:Arial, Helvetica, sans-serif;background:#ffffff;color:#333333;}
.searchbar-wrapper{background:#f1f1f1;padding:12px 15px;border-bottom:1px solid #ddd;}
.searchbar-inner{width:84%;max-width:96em;margin:0 auto;}
.searchbar-form{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:14px;}
.searchbar-form input[type="text"]{flex:1 1 320px;padding:8px 10px;border:1px solid #ccc;border-radius:2px;font-size:15px;min-width:0;}
.searchbar-form input[type="text"]:focus{outline:2px solid var(--c-blue);outline-offset:0;border-color:var(--c-blue);}
.searchbar-form button{padding:8px 16px;border-radius:2px;border:1px solid var(--c-blue);background:var(--c-blue);color:#fff;cursor:pointer;font-size:14px;}
.searchbar-form button:hover{filter:brightness(.92);}
.searchbar-form label{display:inline-flex;align-items:center;gap:4px;font-size:13px;}
.maincontent{clear:both;width:84%;font-size:.8125em;max-width:96em;margin:0 auto;padding:1em 0;color:#333333;line-height:1.5em;position:relative;}
.section{clear:both;padding:0;margin:0;}
.group{display:flex;flex-wrap:wrap;gap:0 2%;}
.col{box-sizing:border-box;flex:0 0 calc((100% - (var(--columns) - 1)*2%)/var(--columns));max-width:calc((100% - (var(--columns) - 1)*2%)/var(--columns));margin:1% 0;}
.span_1_of_5,.span_2_of_5,.span_3_of_5,.span_4_of_5,.span_5_of_5{}
@media only screen and (max-width:767px){.col{flex:1 1 100%;max-width:100%;margin:1% 0;}.searchbar-inner,.maincontent{width:100%;padding-left:0;padding-right:0;}.maincontent{padding:1em 12px;width:auto;}}
.btn{box-sizing:border-box;text-align:left;display:block;width:100%;color:#333;position:relative;overflow:hidden;margin:8px 0 0;padding:10px 14px;cursor:pointer;outline:0;border-style:none none none solid;border-width:0 0 0 3px;background:#eee;z-index:1;font-family:"Segoe UI",Helvetica,Arial,sans-serif;font-size:16px;line-height:18px;text-shadow:#fff 0 1px 0;text-decoration:none;white-space:nowrap;text-overflow:ellipsis;font-weight:600;}
.btn:hover{background-color:#aaa;color:#000;}
.blue-btn{border-left-color:var(--c-blue);}.green-btn{border-left-color:var(--c-green);}.orange-btn{border-left-color:var(--c-orange);}.purple-btn{border-left-color:var(--c-purple);}.red-btn{border-left-color:var(--c-red);}
.hdr{box-sizing:border-box;text-align:left;display:block;width:100%;color:#fff;position:relative;overflow:hidden;margin:8px 0 0;padding:10px 14px;cursor:pointer;outline:0;border:0;z-index:1;font-family:"Segoe UI",Helvetica,Arial,sans-serif;font-size:14px;line-height:14px;text-decoration:none;white-space:nowrap;text-overflow:ellipsis;}
.blue-hdr{background-color:var(--c-blue);}.green-hdr{background-color:var(--c-green);}.orange-hdr{background-color:var(--c-orange);}.purple-hdr{background-color:var(--c-purple);}.red-hdr{background-color:var(--c-red);}
.hdr-para{margin:0;line-height:160%;}
  </style>
</head>
<body data-skin="classic" data-columns="3">

<div class="searchbar-wrapper">
  <div class="searchbar-inner">
    <form class="searchbar-form" method="get" action="https://www.google.co.uk/search">
      <input type="text" name="q" placeholder="Search…" aria-label="Search the web" autofocus>
      <label><input type="radio" name="searchtype" value="web" checked> Web</label>
      <label><input type="radio" name="searchtype" value="wiki"> Wikipedia</label>
      <button type="submit">Search</button>
    </form>
  </div>
</div>
<div class="maincontent">
  <div class="section group">
<div class="col span_1_of_5">
    <p class="hdr-para">
      <a class="hdr green-hdr" data-section-header="true"><b>Search</b></a>
    </p>
    <a class="btn green-btn" href="https://www.google.com/" target="_blank" rel="noopener noreferrer">
      Google
    </a>
    <p class="hdr-para">
      <a class="hdr red-hdr" data-section-header="true"><b>Shopping</b></a>
    </p>
    <a class="btn red-btn" href="https://www.instacart.com/" target="_blank" rel="noopener noreferrer">
      Instacart
    </a>

</div>
<div class="col span_1_of_5">
    <p class="hdr-para">
      <a class="hdr orange-hdr" data-section-header="true"><b>School</b></a>
    </p>
    <a class="btn orange-btn" href="https://www.powerschool.com/parents/" target="_blank" rel="noopener noreferrer">
      PowerSchool Par
    </a>
    <p class="hdr-para">
      <a class="hdr blue-hdr" data-section-header="true"><b>Utilities</b></a>
    </p>
    <a class="btn blue-btn" href="https://www.zillow.com/" target="_blank" rel="noopener noreferrer">
      Zillow
    </a>

</div>
<div class="col span_1_of_5">
    <p class="hdr-para">
      <a class="hdr purple-hdr" data-section-header="true"><b>Streaming</b></a>
    </p>
    <a class="btn purple-btn" href="https://www.netflix.com/" target="_blank" rel="noopener noreferrer">
      Netflix
    </a>

</div>
  </div>
</div>
<script>
  (function attachMenuBehaviour(root=document){
  const form = root.querySelector(".searchbar-form");
  if(form){
    form.addEventListener("submit", function(){
      const type = form.querySelector('input[name="searchtype"]:checked');
      const q = form.querySelector('input[name="q"]');
      if(type && type.value === "wiki" && q){ q.value = q.value + " site:wikipedia.org"; }
    });
    const q = form.querySelector('input[name="q"]');
    if(q && q.hasAttribute("autofocus")){ try{ q.focus(); }catch(err){} }
  }
  root.querySelectorAll('[data-section-header="true"]').forEach(function(h){
    h.addEventListener("click", function(ev){
      ev.preventDefault();
      let current = h.parentElement.nextElementSibling;
      let hiding = false;
      while(current){
        const nextHeader = current.querySelector && current.querySelector('[data-section-header="true"]');
        if(nextHeader) break;
        if(current.tagName === "A" && current.classList.contains("btn")){ hiding = current.style.display !== "none"; break; }
        current = current.nextElementSibling;
      }
      current = h.parentElement.nextElementSibling;
      while(current){
        const nextHeader2 = current.querySelector && current.querySelector('[data-section-header="true"]');
        if(nextHeader2) break;
        if(current.tagName === "A" && current.classList.contains("btn")){ current.style.display = hiding ? "none" : ""; }
        current = current.nextElementSibling;
      }
    });
  });
})(document);
</script>
</body>
</html>
